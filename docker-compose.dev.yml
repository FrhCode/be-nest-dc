services:
  redis:
    image: bitnami/redis:latest
    restart: always
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USERNAME: ${REDIS_USER}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./redis_data:/data
    

  postgres:
    image: postgres:alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

networks:
  default:
    name: app_network